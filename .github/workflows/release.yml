name: Build and Release Electron App

on:
  push:
    tags:
      - "v*" # v1.0.1, v2.0.0 같은 태그가 push 될 때 실행
    branches:
      - main # main 브랜치에 코드가 push 될 때 실행

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write # GitHub Releases 생성 및 에셋 업로드 권한을 위해 필수

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Publish Electron App
        run: npm run electron:build -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # (추가) electron-builder 전용 토큰
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_SERPAPI_KEY: ${{ secrets.VITE_SERPAPI_KEY }}

      - name: Upload Artifacts (보험용 안전장치!)
        uses: actions/upload-artifact@v4
        with:
          name: imhaming-app-exe
          path: release-build-v2/*.exe # 릴리스에 실패해도 Actions 탭에 무조건 exe 파일을 남깁니다!
