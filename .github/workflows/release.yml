name: Build and Release Electron App

on:
  push:
    tags:
      - "v*" # v1.0.1, v2.0.0 같은 태그가 push 될 때 실행
    branches:
      - main # main 브랜치에 코드가 push 될 때 실행

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write # GitHub Releases 생성 및 에셋 업로드 권한을 위해 필수

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Publish Electron App
        run: npm run electron:build -- --publish always
        env:
          # electron-builder가 자동으로 릴리스를 Publish 할 수 있도록 깃허브 토큰 연결
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 프론트엔드 환경 변수 (GitHub Secrets에 직접 등록해야 합니다!)
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_SERPAPI_KEY: ${{ secrets.VITE_SERPAPI_KEY }}
